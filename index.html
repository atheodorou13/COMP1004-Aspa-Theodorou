<!--
  Trivia Fiesta - Single Page Application (SPA)

  Entry point of the application.
  Defines the main layout structure (header, stage, and app container)
  and loads all required modules:

  - Question datasets (English & Greek)
  - Data loader
  - DOM helper utilities
  - SPA application logic

  The dynamic content is rendered inside the #app container
  using JavaScript, following a client-side SPA architecture.
-->

<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" /> <!-- UTF-8 supports Greek + English -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trivia Fiesta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="page">
        <header class="app-header">
            <div class="brand">
                <img src="logo.png" alt="Trivia Fiesta logo" class="logo" />
                <h1 class="app-title">
                    Trivia Fiesta
                    <span class="app-tagline">Celebrating Knowledge, One Question At A Time!</span>
                </h1>
            </div>

            <div class="toolbar">
                <button id="themeBtn" class="icon-btn" type="button" aria-label="Toggle theme">
                    ☾
                </button>
                <button id="soundBtn" class="icon-btn" type="button" aria-label="Toggle sound">
                    🔊
                </button>

            </div>
        </header>

        <main class="stage" aria-live="polite"> <!-- aria-live improves accessibility for dynamic SPA updates -->
            <div id="app" class="app"></div>
        </main>


    </div>

    <script src="Data/questions_en.js"></script>
    <script src="Data/questions_gr.js"></script>
    <script src="Data/data.js"></script>
    <script src="helper.js"></script>
    <script src="spa_logic.js"></script>

</body>

</html>
